<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sandals Business Manager</title>

<link rel="stylesheet" href="styles.css">

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#0f172a">
</head>

<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="screen active">

    <div class="login-card">
        <h1>👡 Sandals Manager</h1>

        <input
            type="email"
            id="email"
            placeholder="Email"
        >

        <input
            type="password"
            id="password"
            placeholder="Password"
        >

        <button id="loginBtn">
            Login
        </button>

        <p id="loginMessage"></p>
    </div>

</div>

<!-- APP -->
<div id="appScreen" class="screen">

    <!-- HEADER -->
    <header>

        <div>
            <h2>Sandals Manager</h2>
            <span id="currentUser"></span>
        </div>

        <button id="logoutBtn">
            Logout
        </button>

    </header>

    <!-- DASHBOARD -->
    <section id="dashboardSection" class="page active">

        <h3>Dashboard</h3>

        <div class="cards">

            <div class="card">
                <span>Sales Today</span>
                <h2 id="salesToday">
                    KSh 0
                </h2>
            </div>

            <div class="card">
                <span>Expenses Today</span>
                <h2 id="expensesToday">
                    KSh 0
                </h2>
            </div>

            <div class="card">
                <span>Profit Today</span>
                <h2 id="profitToday">
                    KSh 0
                </h2>
            </div>

            <div class="card">
                <span>Stock Pairs</span>
                <h2 id="stockCount">
                    0
                </h2>
            </div>

        </div>

        <div class="recent-box">

            <h4>Recent Activity</h4>

            <ul id="recentActivity">

                <li>No activity yet</li>

            </ul>

        </div>

    </section>

    <!-- INVENTORY -->
    <section id="inventorySection" class="page">

        <h3>Inventory</h3>

        <div class="form-card">

            <input
                type="text"
                id="productName"
                placeholder="Product Name"
            >

            <input
                type="text"
                id="category"
                placeholder="Category"
            >

            <input
                type="number"
                id="costPrice"
                placeholder="Cost Price"
            >

            <input
                type="number"
                id="sellingPrice"
                placeholder="Selling Price"
            >

            <input
                type="text"
                id="color"
                placeholder="Color"
            >

            <input
                type="text"
                id="size"
                placeholder="Size"
            >

            <input
                type="number"
                id="stock"
                placeholder="Stock Quantity"
            >

            <button id="addInventoryBtn">
                Add Product
            </button>

        </div>

        <div id="inventoryList"></div>

    </section>

    <!-- SALES -->
    <section id="salesSection" class="page">

        <h3>Record Sale</h3>

        <div class="form-card">

            <select id="saleProduct">
                <option value="">
                    Select Product
                </option>
            </select>

            <select id="saleColor">
                <option value="">
                    Select Color
                </option>
            </select>

            <select id="saleSize">
                <option value="">
                    Select Size
                </option>
            </select>

            <input
                type="number"
                id="saleQty"
                placeholder="Quantity"
            >

            <button id="saveSaleBtn">
                Save Sale
            </button>

        </div>

        <div id="salesHistory"></div>

    </section>

    <!-- EXPENSES -->
    <section id="expensesSection" class="page">

        <h3>Expenses</h3>

        <div class="form-card">

            <select id="expenseCategory">

                <option>
                    Transport
                </option>

                <option>
                    Rent
                </option>

                <option>
                    Packaging
                </option>

                <option>
                    Airtime
                </option>

                <option>
                    Other
                </option>

            </select>

            <input
                type="number"
                id="expenseAmount"
                placeholder="Amount"
            >

            <input
                type="text"
                id="expenseDescription"
                placeholder="Description"
            >

            <button id="saveExpenseBtn">
                Save Expense
            </button>

        </div>

        <div id="expenseList"></div>

    </section>

    <!-- REPORTS -->
    <section id="reportsSection" class="page">

        <h3>Reports</h3>

        <div class="cards">

            <div class="card">
                <span>Monthly Sales</span>
                <h2 id="monthlySales">
                    KSh 0
                </h2>
            </div>

            <div class="card">
                <span>Monthly Expenses</span>
                <h2 id="monthlyExpenses">
                    KSh 0
                </h2>
            </div>

            <div class="card">
                <span>Monthly Profit</span>
                <h2 id="monthlyProfit">
                    KSh 0
                </h2>
            </div>

        </div>

        <canvas id="reportChart"></canvas>

    </section>

    <!-- BOTTOM NAV -->

    <nav class="bottom-nav">

        <button data-page="dashboardSection">
            Dashboard
        </button>

        <button data-page="inventorySection">
            Inventory
        </button>

        <button data-page="salesSection">
            Sales
        </button>

        <button data-page="expensesSection">
            Expenses
        </button>

        <button data-page="reportsSection">
            Reports
        </button>

    </nav>

</div>

<script type="module" src="app.js"></script>

</body>
</html>

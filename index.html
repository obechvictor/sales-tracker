<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Sandals Manager</title>

<link rel="stylesheet"
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f5f7fb;
}

header{
background:linear-gradient(
135deg,
#1296db,
#0b6ea8
);
color:white;
padding:20px;
border-radius:0 0 25px 25px;
}

.user{
display:flex;
justify-content:space-between;
align-items:center;
}

.summary{
background:white;
margin-top:20px;
padding:15px;
border-radius:20px;
box-shadow:0 3px 10px rgba(0,0,0,.1);
}

.summary h2{
font-size:28px;
margin-top:5px;
}

.container{
padding:15px;
padding-bottom:90px;
}

.card{
background:white;
border-radius:20px;
padding:15px;
margin-bottom:15px;
box-shadow:0 3px 10px rgba(0,0,0,.08);
}

.card h3{
margin-bottom:10px;
}

input,
select{
width:100%;
padding:12px;
margin:6px 0;
border:1px solid #ddd;
border-radius:10px;
}

button{
width:100%;
padding:12px;
border:none;
background:#1296db;
color:white;
border-radius:10px;
font-weight:600;
}

.inventory-item{
padding:10px;
border-bottom:1px solid #eee;
}

nav{
position:fixed;
bottom:0;
left:0;
right:0;
height:65px;
background:white;
display:flex;
box-shadow:0 -3px 10px rgba(0,0,0,.1);
}

nav button{
flex:1;
background:none;
color:#444;
border:none;
border-radius:0;
font-size:12px;
}

.page{
display:none;
}

.active{
display:block;
}

.metric{
display:flex;
justify-content:space-between;
margin-top:10px;
}

.metric strong{
color:#1296db;
}

</style>
</head>

<body>

<header>

<div class="user">

<div>

<h2>👡 Sandals Manager</h2>

<p>Victor & Wife</p>

</div>

</div>

<div class="summary">

<p>Today's Sales</p>

<h2 id="salesToday">
KSh 0
</h2>

<div class="metric">

<span>Expenses</span>

<strong id="expensesToday">
KSh 0
</strong>

</div>

<div class="metric">

<span>Profit</span>

<strong id="profitToday">
KSh 0
</strong>

</div>

</div>

</header>

<div class="container">

<!-- DASHBOARD -->

<div id="dashboard"
class="page active">

<div class="card">

<h3>Business Summary</h3>

<p>Total Inventory Items:
<span id="stockCount">0</span>
</p>

</div>

</div>

<!-- INVENTORY -->

<div id="inventory"
class="page">

<div class="card">

<h3>Add Product</h3>

<input
id="productName"
placeholder="Product Name">

<input
id="productColor"
placeholder="Color">

<input
id="productSize"
placeholder="Size">

<input
id="productStock"
type="number"
placeholder="Stock">

<input
id="sellingPrice"
type="number"
placeholder="Selling Price">

<button id="addProductBtn">

Add Product

</button>

</div>

<div class="card">

<h3>Inventory</h3>

<div id="inventoryList"></div>

</div>

</div>

<!-- SALES -->

<div id="sales"
class="page">

<div class="card">

<h3>Record Sale</h3>

<select id="saleProduct">

<option value="">
Select Product

</option>

</select>

<input
id="saleQty"
type="number"
placeholder="Quantity">

<button id="saveSaleBtn">

Record Sale

</button>

</div>

<div class="card">

<h3>Sales History</h3>

<div id="salesList"></div>

</div>

</div>

<!-- EXPENSES -->

<div id="expenses"
class="page">

<div class="card">

<h3>Add Expense</h3>

<input
id="expenseName"
placeholder="Expense Name">

<input
id="expenseAmount"
type="number"
placeholder="Amount">

<button id="saveExpenseBtn">

Save Expense

</button>

</div>

<div class="card">

<h3>Expense History</h3>

<div id="expenseList"></div>

</div>

</div>

</div>

<nav>

<button onclick="showPage('dashboard')">

🏠<br>
Home

</button>

<button onclick="showPage('inventory')">

📦<br>
Stock

</button>

<button onclick="showPage('sales')">

💰<br>
Sales

</button>

<button onclick="showPage('expenses')">

🧾<br>
Expenses

</button>

</nav>

<script src="app.js" type="module"></script>

</body>
</html>
